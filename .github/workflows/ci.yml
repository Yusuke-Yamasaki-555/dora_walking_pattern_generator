name: CI

on:
  pull_request:
    branches: [master]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: "1"
  MUJOCO_VERSION: 3.9.0
  MUJOCO_ARCHIVE_SHA256: d11f281540d0d1844e2923bf43b6fff5ad186ec55927a8dae0eb26b9e579eed2
  MUJOCO_ROOT: ${{ github.workspace }}/.ci/mujoco-3.9.0
  MUJOCO_DYNAMIC_LINK_DIR: ${{ github.workspace }}/.ci/mujoco-3.9.0/lib
  LD_LIBRARY_PATH: ${{ github.workspace }}/.ci/mujoco-3.9.0/lib
  MENAGERIE_COMMIT: 71f066ad0be9cd271f7ed58c030243ef157af9f4

jobs:
  verify:
    name: Rust and MuJoCo
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install native build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libegl1-mesa-dev \
            libgl1-mesa-dev \
            libwayland-dev \
            libx11-dev \
            libxcursor-dev \
            libxi-dev \
            libxinerama-dev \
            libxkbcommon-dev \
            libxrandr-dev

      - name: Cache MuJoCo
        id: cache-mujoco
        uses: actions/cache@caa296126883cff596d87d8935842f9db880ef25 # v5
        with:
          path: ${{ env.MUJOCO_ROOT }}
          key: mujoco-${{ runner.os }}-${{ runner.arch }}-${{ env.MUJOCO_VERSION }}-${{ env.MUJOCO_ARCHIVE_SHA256 }}

      - name: Install MuJoCo
        if: steps.cache-mujoco.outputs.cache-hit != 'true'
        shell: bash
        run: |
          set -euo pipefail
          archive="${RUNNER_TEMP}/mujoco.tar.gz"
          curl --fail --location --silent --show-error \
            --retry 3 --retry-all-errors --connect-timeout 15 --max-time 120 \
            --output "${archive}" \
            "https://github.com/google-deepmind/mujoco/releases/download/${MUJOCO_VERSION}/mujoco-${MUJOCO_VERSION}-linux-x86_64.tar.gz"
          echo "${MUJOCO_ARCHIVE_SHA256}  ${archive}" | sha256sum --check --strict
          mkdir -p "$(dirname "${MUJOCO_ROOT}")"
          tar -xzf "${archive}" -C "$(dirname "${MUJOCO_ROOT}")"

      - name: Verify MuJoCo installation
        run: |
          test -f "${MUJOCO_DYNAMIC_LINK_DIR}/libmujoco.so"
          test "$(basename "$(readlink -f "${MUJOCO_DYNAMIC_LINK_DIR}/libmujoco.so")")" = "libmujoco.so.${MUJOCO_VERSION}"

      - name: Checkout Cassie model
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: google-deepmind/mujoco_menagerie
          ref: ${{ env.MENAGERIE_COMMIT }}
          path: mujoco_menagerie
          sparse-checkout: agility_cassie
          fetch-depth: 1
          persist-credentials: false

      - name: Verify Cassie model
        run: |
          test -f mujoco_menagerie/agility_cassie/scene.xml
          test -f mujoco_menagerie/agility_cassie/LICENSE

      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal --component rustfmt,clippy
          rustup default stable

      - name: Cache Cargo
        uses: actions/cache@caa296126883cff596d87d8935842f9db880ef25 # v5
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: cargo-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            cargo-${{ runner.os }}-${{ runner.arch }}-

      - name: Fetch locked dependencies
        run: cargo fetch --locked

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Check workspace
        run: cargo check --workspace --locked

      - name: Run Clippy
        run: cargo clippy --workspace --all-targets --all-features --locked -- -D warnings

      - name: Run tests
        shell: bash
        run: |
          set -o pipefail
          cargo test --workspace --locked 2>&1 | tee ci-test-output.log

      - name: Upload test log
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: rust-test-log-${{ github.run_id }}
          path: ci-test-output.log
          if-no-files-found: warn
          retention-days: 7
